name: QA 자동화 테스트

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: 라이브러리 설치
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: 환경변수 설정
        run: echo "BASE_URL=https://jsonplaceholder.typicode.com" >> $GITHUB_ENV

      - name: 전체 테스트 실행 (UI + API)
        run: pytest tests/ -v --html=report.html --self-contained-html

      - name: 테스트 리포트 업로드
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.html
